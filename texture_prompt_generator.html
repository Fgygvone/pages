<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Texture Gen v4</title>
<style>
    :root {
        --bg-body: #0f1219;
        --bg-card: #1a1d26;
        --bg-input: #232732;
        --accent-main: #5e6aff;
        --text-primary: #ffffff;
        --text-secondary: #9ca3af;
        --pos-bg: rgba(16, 185, 129, 0.15);
        --pos-border: rgba(16, 185, 129, 0.4);
        --neg-bg: rgba(239, 68, 68, 0.15);
        --neg-border: rgba(239, 68, 68, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    
    /* Защита от скролла по горизонтали при свайпе */
    html { overflow-x: hidden; } 
    
    /* Анимация появления страницы (выезжает слева) */
    body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: var(--bg-body); color: var(--text-primary); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; animation: slideInLeft 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
    @keyframes slideInLeft { 0% { transform: translateX(-50vw); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
    
    .top-nav { display: flex; gap: 15px; margin-bottom: 30px; background: var(--bg-card); padding: 8px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); z-index: 10; }
    .nav-btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; color: var(--text-secondary); transition: all 0.2s; border: 2px solid transparent; cursor: pointer; }
    .nav-btn:hover { color: white; background: var(--bg-input); }
    .nav-btn.active { background: rgba(94, 106, 255, 0.15); color: var(--accent-main); border-color: var(--accent-main); }
    .nav-btn.concept-btn:hover { color: #f59e0b; background: rgba(245, 158, 11, 0.1); border-color: transparent; }

    .main-wrapper { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 350px 1fr; gap: 24px; z-index: 10; }
    .settings-card { background-color: var(--bg-card); padding: 30px; border-radius: 16px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
    .header-title { font-size: 18px; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .header-title span { color: var(--accent-main); }
    .input-wrapper { display: flex; flex-direction: column; gap: 8px; position: relative; }
    label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
    .name-input-row { display: flex; gap: 8px; align-items: stretch; }
    .name-input-row input { flex: 1; }
    .btn-translate { height: 48px; padding: 0 14px; background: rgba(94,106,255,0.15); border: 2px solid rgba(94,106,255,0.3); border-radius: 10px; color: #a5b4fc; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .btn-translate:hover { background: rgba(94,106,255,0.3); border-color: var(--accent-main); color: white; }
    .btn-translate.loading { opacity: 0.6; cursor: wait; }
    .translate-status { font-size: 11px; padding: 4px 8px; border-radius: 4px; display: none; }
    .translate-status.success { background: rgba(16,185,129,0.15); color: #34d399; display: block; }
    .translate-status.error { background: rgba(239,68,68,0.15); color: #f87171; display: block; }
    .translate-status.loading { background: rgba(94,106,255,0.15); color: #a5b4fc; display: block; }
    input, select { width: 100%; height: 48px; padding: 0 14px; background-color: var(--bg-input); border: 2px solid transparent; border-radius: 10px; color: white; font-size: 15px; transition: all 0.2s ease; cursor: pointer; }
    input:focus, select:focus { border-color: var(--accent-main); background-color: #2a3040; box-shadow: 0 0 0 4px rgba(94,106,255,0.15); }
    select option[value=""] { color: #6b7280; font-style: italic; }
    select.no-selection { color: #6b7280; border-color: rgba(107,114,128,0.3); }
    .view-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .view-btn { height: 42px; background: var(--bg-input); border: 2px solid transparent; border-radius: 10px; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .view-btn:hover { border-color: rgba(94,106,255,0.4); color: white; }
    .view-btn.active { background: rgba(94,106,255,0.15); border-color: var(--accent-main); color: #a5b4fc; }
    .btn-generate { width: 100%; height: 56px; background: linear-gradient(90deg, var(--accent-main), #7b8aff); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: auto; transition: transform 0.2s, box-shadow 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(94,106,255,0.3); }
    .params-counter { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 6px; background: rgba(94,106,255,0.08); border-radius: 6px; border: 1px solid rgba(94,106,255,0.15); }
    .params-counter span { color: var(--accent-main); font-weight: 700; }
    .result-card { display: flex; flex-direction: column; gap: 20px; }
    .prompt-block { background: var(--bg-card); border-radius: 16px; padding: 24px; position: relative; display: flex; flex-direction: column; height: 380px; }
    .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .label-row { display: flex; align-items: center; gap: 10px; }
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
    .badge-pos { background: var(--pos-bg); border: 1px solid var(--pos-border); color: #a7f3d0; }
    .badge-neg { background: var(--neg-bg); border: 1px solid var(--neg-border); color: #fecaca; }
    textarea { width: 100%; height: 100%; background: transparent; border: none; resize: none; color: #d1d5db; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; overflow-y: auto; }
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    .btn-copy-small { background: rgba(255,255,255,0.05); border: none; color: var(--text-secondary); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-copy-small:hover { background: rgba(255,255,255,0.1); color: white; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 16px 24px; border-radius: 12px; background: rgba(0,0,0,0.2); margin-top: auto; }
    .setting-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .s-label { font-size: 10px; color: #6b7280; text-transform: uppercase; }
    .s-value { font-family: 'Consolas', monospace; font-weight: 700; font-size: 14px; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; border-left: 5px solid var(--accent-main); color: white; padding: 16px 24px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: translateY(120%); transition: transform 0.3s; display: flex; align-items: center; gap: 10px; z-index: 100; }
    .toast.show { transform: translateY(0); }
    @media (max-width: 768px) { body { padding: 20px 15px; } .main-wrapper { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- === РАНДОМНЫЙ АНИМИРОВАННЫЙ ФОН === -->
<div id="dynamic-bg-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; overflow: hidden; background-color: var(--bg-body);"></div>

<div class="top-nav">
    <a onclick="navigateTo('index.html')" class="nav-btn active">🧱 Текстуры</a>
    <a onclick="navigateTo('concept.html')" class="nav-btn concept-btn">🖼️ Локации (Концепты)</a>
</div>

<div class="main-wrapper">
    <div class="settings-card">
        <div class="header-title">Параметры <span>Текстуры</span></div>

        <div class="input-wrapper">
            <label>Название текстуры (Required)</label>
            <div class="name-input-row">
                <input type="text" id="textureName" placeholder="замшелые кирпичи / mossy bricks..." autocomplete="off" oninput="checkLang()">
                <button class="btn-translate" id="translateBtn" onclick="translateName()" title="Перевести на английский">🌐 EN</button>
            </div>
            <div class="translate-status" id="translateStatus"></div>
        </div>

        <div class="input-wrapper">
            <label>📐 Ракурс камеры</label>
            <div class="view-selector">
                <button class="view-btn active" id="view-top" onclick="setView('top')">⬆️ Сверху (Top-Down)</button>
                <button class="view-btn" id="view-front" onclick="setView('front')">⬛ Спереди (Front)</button>
                <button class="view-btn" id="view-close" onclick="setView('close')">🔍 Макро (Close)</button>
                <button class="view-btn" id="view-angle" onclick="setView('angle')">📐 Угол (Angled)</button>
            </div>
        </div>

        <div class="input-wrapper">
            <label>Стиль (Optional)</label>
            <select id="gameStyle" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="realistic">Фотореализм</option>
                <option value="stylized">Стилизованный</option>
                <option value="lowpoly">Low Poly / Indie</option>
                <option value="scifi">Sci-Fi / Cyberpunk</option>
                <option value="fantasy">High Fantasy</option>
                <option value="horror">Horror / Dark</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Поверхность (Optional)</label>
            <select id="surfaceType" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="floor">Пол / Земля</option>
                <option value="wall">Стена</option>
                <option value="ceiling">Потолок</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Тип укладки (Optional)</label>
            <select id="tilingPattern" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="solid">Сплошной (Solid)</option>
                <option value="brick">Кирпичная (Brick bond)</option>
                <option value="cobble">Булыжник (Cobblestone)</option>
            </select>
        </div>

        <div class="params-counter">Активных параметров: <span id="activeCount">0</span> из 3</div>
        <button class="btn-generate" onclick="generatePrompt()">⚡ Сгенерировать промпт</button>
    </div>

    <div class="result-card">
        <div class="prompt-block" style="border-top: 4px solid var(--pos-border); background: rgba(16,185,129,0.03);">
            <div class="block-header">
                <div class="label-row"><span class="badge badge-pos">Positive Prompt</span></div>
                <button class="btn-copy-small" onclick="copyText('positive-area')">📋 Копировать</button>
            </div>
            <textarea id="positive-area" readonly></textarea>
            <div class="settings-grid">
                <div class="setting-item"><span class="s-label">Steps</span><span class="s-value" id="disp-steps" style="color:#fff;">4</span></div>
                <div class="setting-item"><span class="s-label">CFG</span><span class="s-value" id="disp-cfg" style="color:#fbbf24;">1.0</span></div>
                <div class="setting-item"><span class="s-label">Sampler</span><span class="s-value" id="disp-sampler" style="color:#3b82f6;">euler</span></div>
            </div>
        </div>
        <div class="prompt-block" style="border-top: 4px solid var(--neg-border); background: rgba(0,0,0,0.2);">
            <div class="block-header">
                <div class="label-row"><span class="badge badge-neg">Negative Prompt</span></div>
                <button class="btn-copy-small" onclick="copyText('negative-area')">📋 Копировать</button>
            </div>
            <textarea id="negative-area" readonly style="color:#7f1d1d;"></textarea>
        </div>
    </div>
</div>

<div class="toast" id="toast"><span id="toast-msg">✅ Готово!</span></div>

<script>
/* =========================================
   ЛОГИКА СВАЙПОВ И АНИМАЦИИ ПЕРЕХОДОВ
   ========================================= */
const currentPage = 'texture_prompt_generator.html';
const targetPage = 'Concept.html'; // Со страницы Текстур можно свайпнуть только ВЛЕВО (на Концепты)

function navigateTo(url) {
    if(url === currentPage) return;
    document.body.style.transition = 'transform 0.3s ease-in, opacity 0.3s ease-in';
    document.body.style.transform = 'translateX(-50vw)';
    document.body.style.opacity = '0';
    setTimeout(() => window.location.href = url, 300);
}

let startX = 0; let currentX = 0; let isDragging = false;
document.addEventListener('mousedown', startDrag); document.addEventListener('touchstart', startDrag);
document.addEventListener('mousemove', drag);      document.addEventListener('touchmove', drag);
document.addEventListener('mouseup', endDrag);     document.addEventListener('touchend', endDrag);

function getX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }

function startDrag(e) {
    // Игнорируем свайп, если курсор на полях ввода или кнопках
    const tag = e.target.tagName.toLowerCase();
    if (['input', 'textarea', 'select', 'button', 'a', 'option'].includes(tag)) return;
    
    startX = getX(e);
    isDragging = true;
    document.body.style.transition = 'none';
}

function drag(e) {
    if (!isDragging) return;
    currentX = getX(e);
    let deltaX = currentX - startX;
    
    // На этой странице разрешаем тянуть только влево (к Концептам). Вправо - сильное сопротивление.
    if (deltaX > 0) deltaX = deltaX * 0.15; 
    document.body.style.transform = `translateX(${deltaX}px)`;
}

function endDrag() {
    if (!isDragging) return;
    isDragging = false;
    let deltaX = currentX - startX;
    document.body.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
    
    if (deltaX < -150) { // Свайпнули влево достаточно сильно -> Переход
        document.body.style.transform = 'translateX(-100vw)';
        document.body.style.opacity = '0';
        setTimeout(() => window.location.href = targetPage, 300);
    } else { // Возврат на место
        document.body.style.transform = 'translateX(0)';
    }
}

/* =========================================
   РАНДОМНЫЙ ФОН
   ========================================= */
(function initRandomBackground() {
    const container = document.getElementById('dynamic-bg-container');
    const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-main').trim();
    function hexToRgb(h){ let c=h.replace('#',''); return `${parseInt(c.substring(0,2),16)},${parseInt(c.substring(2,4),16)},${parseInt(c.substring(4,6),16)}`; }
    const rgbAccent = hexToRgb(accentColor);
    const bgType = Math.floor(Math.random() * 3);

    if (bgType === 0) { // Шум / Latent
        container.innerHTML = `<div class="latent-blob blob-1"></div><div class="latent-blob blob-2"></div>`;
        const s = document.createElement('style');
        s.innerHTML = `.latent-blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;animation:dr 20s infinite alternate ease-in-out;}.blob-1{width:60vw;height:60vw;background:${accentColor};top:-10%;left:-10%;}.blob-2{width:50vw;height:50vw;background:#fff;bottom:-10%;right:-10%;animation-delay:-5s;opacity:0.05;}@keyframes dr{0%{transform:translate(0,0) scale(1);}100%{transform:translate(15%,20%) scale(1.2) rotate(15deg);}}`;
        document.head.appendChild(s);
    } else if (bgType === 1) { // Пыль
        const cvs = document.createElement('canvas'); container.appendChild(cvs); const ctx = cvs.getContext('2d');
        let w, h; let parts = [];
        function rs() { w=cvs.width=window.innerWidth; h=cvs.height=window.innerHeight; }
        window.addEventListener('resize', rs); rs();
        class Mote {
            constructor(){ this.x=Math.random()*w; this.y=Math.random()*h; this.r=Math.random()*2+0.5; this.vy=-(Math.random()*0.3+0.1); this.vx=(Math.random()-0.5)*0.2; this.a=Math.random()*0.5; this.fd=(Math.random()-0.5)*0.01; }
            update(){ this.y+=this.vy; this.x+=this.vx; this.a+=this.fd; if(this.a>0.6||this.a<0)this.fd*=-1; if(this.y<-10)this.y=h+10; }
            draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(${rgbAccent},${Math.max(0,this.a)})`; ctx.fill(); }
        }
        for(let i=0;i<70;i++) parts.push(new Mote());
        function anim() { ctx.clearRect(0,0,w,h); parts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(anim); }
        anim();
    } else { // Матрица / Поток данных
        const cvs = document.createElement('canvas'); container.appendChild(cvs); const ctx = cvs.getContext('2d');
        let w, h; let cols; const fontSize=14; let drops=[];
        function rs() { w=cvs.width=window.innerWidth; h=cvs.height=window.innerHeight; cols=w/fontSize; drops=[]; for(let i=0;i<cols;i++)drops[i]=Math.random()*h; }
        window.addEventListener('resize', rs); rs();
        function animMatrix() {
            ctx.fillStyle = `rgba(15, 18, 25, 0.1)`; ctx.fillRect(0,0,w,h);
            ctx.fillStyle = `rgba(${rgbAccent}, 0.3)`; ctx.font = fontSize+"px monospace";
            for(let i=0;i<drops.length;i++){
                const text = Math.floor(Math.random()*2);
                ctx.fillText(text, i*fontSize, drops[i]*fontSize);
                if(drops[i]*fontSize > h && Math.random()>0.975) drops[i]=0; drops[i]++;
            }
        }
        setInterval(animMatrix, 50);
    }
})();

/* =========================================
   ОСНОВНАЯ ЛОГИКА (ГЕНЕРАТОР)
   ========================================= */
let selectedView = 'top';
const viewMap = { top: { positive: 'perfectly flat top-down orthographic view', negative: 'perspective, angled' }, front: { positive: 'straight-on front view', negative: 'angled, top-down' }, close: { positive: 'extreme macro close-up photography', negative: 'wide angle' }, angle: { positive: 'slight 3/4 angled view', negative: 'flat top-down' } };
const styleMap = { realistic: { keywords_en: 'photorealistic, 8K', steps: 20, cfg: 7.5, sampler: 'dpmpp_2m' }, lowpoly: { keywords_en: 'low poly, flat shading', steps: 4, cfg: 1.0, sampler: 'euler' } };

function setView(view) { selectedView = view; document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active')); document.getElementById('view-' + view).classList.add('active'); }
function hasCyrillic(text) { return /[а-яёА-ЯЁ]/.test(text); }
function checkLang() { const n = document.getElementById('textureName').value; const b = document.getElementById('translateBtn'); b.style.color = hasCyrillic(n) ? '#fbbf24' : '#a5b4fc'; }

async function translateName() {
    const name = document.getElementById('textureName').value.trim();
    if (!name) return;
    const btn = document.getElementById('translateBtn'); btn.classList.add('loading');
    try {
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=en&dt=t&q=${encodeURIComponent(name)}`);
        const data = await res.json();
        document.getElementById('textureName').value = data[0].map(i=>i[0]).join(' ').trim();
        checkLang();
    } catch (e) { alert("Ошибка перевода"); } finally { btn.classList.remove('loading'); }
}

function updateSelectStyle(el) { el.classList.toggle('no-selection', el.value === ''); }
function updateCounter() { const ids = ['gameStyle', 'surfaceType', 'tilingPattern']; document.getElementById('activeCount').textContent = ids.filter(id => document.getElementById(id).value !== '').length; }

function generatePrompt() {
    const name = document.getElementById('textureName').value.trim();
    if (!name) return alert('Введи название текстуры!');
    
    let pos = `seamless tileable ${name} texture, ` + viewMap[selectedView].positive;
    document.getElementById('positive-area').value = pos + ', high quality PBR material, game ready asset';
    document.getElementById('negative-area').value = 'shadows, baked lighting, low quality, ' + viewMap[selectedView].negative;
    showToast('✅ Промпт сгенерирован!');
}

function copyText(id) { navigator.clipboard.writeText(document.getElementById(id).value).then(() => showToast('📋 Скопировано!')); }
function showToast(msg) { const t = document.getElementById('toast'); document.getElementById('toast-msg').textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
</script>
</body>
</html>
