<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Texture Gen v4</title>
<style>
    :root {
        --bg-body: #0f1219;
        --bg-card: #1a1d26;
        --bg-input: #232732;
        --accent-main: #5e6aff;
        --text-primary: #ffffff;
        --text-secondary: #9ca3af;
        --pos-bg: rgba(16, 185, 129, 0.15);
        --pos-border: rgba(16, 185, 129, 0.4);
        --neg-bg: rgba(239, 68, 68, 0.15);
        --neg-border: rgba(239, 68, 68, 0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: var(--bg-body); color: var(--text-primary); display: flex; justify-content: center; min-height: 100vh; padding: 40px 20px; }
    .main-wrapper { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
    .settings-card { background-color: var(--bg-card); padding: 30px; border-radius: 16px; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
    .header-title { font-size: 18px; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .header-title span { color: var(--accent-main); }
    .input-wrapper { display: flex; flex-direction: column; gap: 8px; position: relative; }
    label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }

    /* Поле имени с кнопкой перевода */
    .name-input-row { display: flex; gap: 8px; align-items: stretch; }
    .name-input-row input { flex: 1; }
    .btn-translate { height: 48px; padding: 0 14px; background: rgba(94,106,255,0.15); border: 2px solid rgba(94,106,255,0.3); border-radius: 10px; color: #a5b4fc; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .btn-translate:hover { background: rgba(94,106,255,0.3); border-color: var(--accent-main); color: white; }
    .btn-translate.loading { opacity: 0.6; cursor: wait; }

    /* Статус перевода */
    .translate-status { font-size: 11px; padding: 4px 8px; border-radius: 4px; display: none; }
    .translate-status.success { background: rgba(16,185,129,0.15); color: #34d399; display: block; }
    .translate-status.error { background: rgba(239,68,68,0.15); color: #f87171; display: block; }
    .translate-status.loading { background: rgba(94,106,255,0.15); color: #a5b4fc; display: block; }

    input, select { width: 100%; height: 48px; padding: 0 14px; background-color: var(--bg-input); border: 2px solid transparent; border-radius: 10px; color: white; font-size: 15px; transition: all 0.2s ease; }
    input:focus, select:focus { border-color: var(--accent-main); background-color: #2a3040; box-shadow: 0 0 0 4px rgba(94,106,255,0.15); }
    select option[value=""] { color: #6b7280; font-style: italic; }
    select.no-selection { color: #6b7280; border-color: rgba(107,114,128,0.3); }

    /* Ракурс — новый параметр */
    .view-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .view-btn { height: 42px; background: var(--bg-input); border: 2px solid transparent; border-radius: 10px; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .view-btn:hover { border-color: rgba(94,106,255,0.4); color: white; }
    .view-btn.active { background: rgba(94,106,255,0.15); border-color: var(--accent-main); color: #a5b4fc; }

    .btn-generate { width: 100%; height: 56px; background: linear-gradient(90deg, var(--accent-main), #7b8aff); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: auto; transition: transform 0.2s, box-shadow 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(94,106,255,0.3); }
    .params-counter { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 6px; background: rgba(94,106,255,0.08); border-radius: 6px; border: 1px solid rgba(94,106,255,0.15); }
    .params-counter span { color: var(--accent-main); font-weight: 700; }

    .result-card { display: flex; flex-direction: column; gap: 20px; }
    .prompt-block { background: var(--bg-card); border-radius: 16px; padding: 24px; position: relative; display: flex; flex-direction: column; height: 380px; }
    .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .label-row { display: flex; align-items: center; gap: 10px; }
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
    .badge-pos { background: var(--pos-bg); border: 1px solid var(--pos-border); color: #a7f3d0; }
    .badge-neg { background: var(--neg-bg); border: 1px solid var(--neg-border); color: #fecaca; }
    textarea { width: 100%; height: 100%; background: transparent; border: none; resize: none; color: #d1d5db; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; overflow-y: auto; }
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    .btn-copy-small { background: rgba(255,255,255,0.05); border: none; color: var(--text-secondary); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-copy-small:hover { background: rgba(255,255,255,0.1); color: white; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 16px 24px; border-radius: 12px; background: rgba(0,0,0,0.2); margin-top: auto; }
    .setting-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .s-label { font-size: 10px; color: #6b7280; text-transform: uppercase; }
    .s-value { font-family: 'Consolas', monospace; font-weight: 700; font-size: 14px; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; border-left: 5px solid var(--accent-main); color: white; padding: 16px 24px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); transform: translateY(120%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; z-index: 100; }
    .toast.show { transform: translateY(0); }
    @media (max-width: 768px) { body { padding: 20px 15px; } .main-wrapper { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="settings-card">
        <div class="header-title">Параметры <span>Текстуры</span></div>

        <!-- Название + кнопка перевода -->
        <div class="input-wrapper">
            <label>Название текстуры (Required)</label>
            <div class="name-input-row">
                <input type="text" id="textureName" placeholder="замшелые кирпичи / mossy bricks..." autocomplete="off" oninput="checkLang()">
                <button class="btn-translate" id="translateBtn" onclick="translateName()" title="Перевести на английский">
                    🌐 EN
                </button>
            </div>
            <div class="translate-status" id="translateStatus"></div>
        </div>

        <!-- Ракурс — НОВЫЙ ПАРАМЕТР -->
        <div class="input-wrapper">
            <label>📐 Ракурс камеры (View Angle)</label>
            <div class="view-selector">
                <button class="view-btn active" id="view-top" onclick="setView('top')">⬆️ Сверху (Top-Down)</button>
                <button class="view-btn" id="view-front" onclick="setView('front')">⬛ Спереди (Front)</button>
                <button class="view-btn" id="view-close" onclick="setView('close')">🔍 Макро (Close-up)</button>
                <button class="view-btn" id="view-angle" onclick="setView('angle')">📐 Угол (Angled)</button>
            </div>
        </div>

        <div class="input-wrapper">
            <label>Стиль (Optional)</label>
            <select id="gameStyle" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="realistic">Фотореализм</option>
                <option value="stylized">Стилизованный</option>
                <option value="lowpoly">Low Poly / Indie</option>
                <option value="scifi">Sci-Fi / Cyberpunk</option>
                <option value="fantasy">High Fantasy</option>
                <option value="horror">Horror / Dark</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Поверхность (Optional)</label>
            <select id="surfaceType" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="floor">Пол / Земля</option>
                <option value="wall">Стена</option>
                <option value="ceiling">Потолок</option>
                <option value="organic">Органика</option>
                <option value="metal">Металл</option>
                <option value="wood">Дерево</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Состояние (Optional)</label>
            <select id="condition" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="new">Новое</option>
                <option value="used">Потёртое</option>
                <option value="old">Старое</option>
                <option value="ruined">Разрушенное</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Цветовая гамма (Optional)</label>
            <select id="colorPalette" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="neutral">Нейтральная</option>
                <option value="warm">Тёплая</option>
                <option value="cool">Холодная</option>
            </select>
        </div>

        <div class="params-counter">Активных параметров: <span id="activeCount">0</span> из 4</div>

        <button class="btn-generate" onclick="generatePrompt()">⚡ Сгенерировать промпт</button>
    </div>

    <div class="result-card">
        <div class="prompt-block" style="border-top: 4px solid var(--pos-border); background: rgba(16,185,129,0.03);">
            <div class="block-header">
                <div class="label-row"><span class="badge badge-pos">Positive Prompt</span></div>
                <button class="btn-copy-small" onclick="copyText('positive-area')">📋 Копировать</button>
            </div>
            <textarea id="positive-area" readonly></textarea>
            <div class="settings-grid">
                <div class="setting-item"><span class="s-label">Steps</span><span class="s-value" id="disp-steps" style="color:#fff;">4</span></div>
                <div class="setting-item"><span class="s-label">CFG Scale</span><span class="s-value" id="disp-cfg" style="color:#fbbf24;">1.0</span></div>
                <div class="setting-item"><span class="s-label">Sampler</span><span class="s-value" id="disp-sampler" style="color:#3b82f6;">euler</span></div>
            </div>
        </div>
        <div class="prompt-block" style="border-top: 4px solid var(--neg-border); background: rgba(0,0,0,0.2);">
            <div class="block-header">
                <div class="label-row"><span class="badge badge-neg">Negative Prompt</span></div>
                <button class="btn-copy-small" onclick="copyText('negative-area')">📋 Копировать</button>
            </div>
            <textarea id="negative-area" readonly style="color:#7f1d1d;"></textarea>
        </div>
    </div>
</div>

<div class="toast" id="toast"><span id="toast-msg">✅ Скопировано!</span></div>

<script>
// Выбранный ракурс
let selectedView = 'top';

const viewMap = {
    top: {
        positive: 'perfectly flat top-down orthographic view, camera directly above surface looking straight down, 90 degree bird-eye angle, zero perspective distortion, completely horizontal flat surface',
        negative: 'side view, angled view, perspective shot, 3D perspective, oblique angle, tilted camera, diagonal view, isometric, diagonal perspective, 3/4 view, vanishing point'
    },
    front: {
        positive: 'straight-on front view, camera perpendicular to surface, flat frontal angle, zero perspective, wall texture perspective',
        negative: 'top-down view, angled view, bird eye view, tilted, diagonal, 3/4 angle, side angle, perspective distortion'
    },
    close: {
        positive: 'extreme macro close-up photography, 100mm macro lens, surface detail magnification, micro texture visible, flat field depth',
        negative: 'wide angle, distant shot, perspective, side view, angled, full scene, landscape'
    },
    angle: {
        positive: 'slight 3/4 angled view, mild perspective showing surface depth, subtle angle revealing texture volume',
        negative: 'perfectly flat top-down, straight front view, extreme angle, fish-eye, distorted perspective'
    }
};

function setView(view) {
    selectedView = view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
}

// Автоперевод
const styleMap = {
    realistic: { keywords_en: 'photorealistic, ultra-detailed, physically accurate, raytracing', quality_add: 'hyperrealistic, 8K detail, film grain', steps: 20, cfg: 7.5, sampler: 'dpmpp_2m' },
    stylized: { keywords_en: 'stylized, hand-painted, artistic, vibrant colors, expressive', quality_add: 'game art style, painterly, vivid saturation', steps: 25, cfg: 7.0, sampler: 'euler_a' },
    lowpoly: { keywords_en: 'low poly, geometric, flat shading, minimal detail', quality_add: 'indie game style, clean topology', steps: 4, cfg: 1.0, sampler: 'euler' },
    scifi: { keywords_en: 'sci-fi, futuristic, high-tech, industrial, mechanical', quality_add: 'cyberpunk aesthetic, metallic, neon', steps: 25, cfg: 7.0, sampler: 'dpmpp_2m' },
    fantasy: { keywords_en: 'fantasy, magical, mystical, ornate, enchanted', quality_add: 'epic fantasy art, rich detail, glowing', steps: 30, cfg: 7.5, sampler: 'dpmpp_2m' },
    horror: { keywords_en: 'horror, dark, disturbing, decayed, ominous, sinister', quality_add: 'dark atmosphere, unsettling, gritty', steps: 30, cfg: 7.5, sampler: 'dpmpp_2m' }
};

const conditionMap = {
    new: 'pristine, perfectly clean, undamaged, factory fresh',
    used: 'worn, slightly weathered, minor scratches, soft patina',
    old: 'heavily aged, weathered, eroded, antique',
    ruined: 'severely damaged, crumbling, decay, destruction'
};

const paletteMap = {
    neutral: 'grey palette, monochromatic, no strong saturation',
    warm: 'warm earth tones, brown and orange hues',
    cool: 'cool blue tones, cold ambient'
};

const surfaceMap = {
    floor: 'ground surface material',
    wall: 'vertical wall surface material',
    ceiling: 'overhead ceiling surface',
    organic: 'natural organic surface',
    metal: 'metallic industrial surface',
    wood: 'wood grain surface material'
};

// Проверяем наличие кириллицы
function hasCyrillic(text) {
    return /[а-яёА-ЯЁ]/.test(text);
}

function checkLang() {
    const name = document.getElementById('textureName').value;
    const btn = document.getElementById('translateBtn');
    if (hasCyrillic(name)) {
        btn.style.borderColor = '#f59e0b';
        btn.style.color = '#fbbf24';
        btn.title = 'Обнаружен русский текст — нажми для перевода!';
    } else {
        btn.style.borderColor = 'rgba(94,106,255,0.3)';
        btn.style.color = '#a5b4fc';
        btn.title = 'Перевести на английский';
    }
}

async function translateName() {
    const name = document.getElementById('textureName').value.trim();
    if (!name) return;
    if (!hasCyrillic(name)) {
        showStatus('Текст уже на английском!', 'success');
        return;
    }

    const btn = document.getElementById('translateBtn');
    btn.classList.add('loading');
    btn.textContent = '⏳';
    showStatus('Переводим...', 'loading');

    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 100,
                messages: [{
                    role: 'user',
                    content: `Translate this texture name from Russian to English for use in AI image generation prompts. Return ONLY the translated text, nothing else, no explanation: "${name}"`
                }]
            })
        });

        const data = await response.json();
        const translated = data.content[0].text.trim().replace(/['"]/g, '');

        document.getElementById('textureName').value = translated;
        showStatus(`✅ Переведено: "${translated}"`, 'success');
        checkLang();
    } catch (err) {
        showStatus('❌ Ошибка перевода — введи название вручную', 'error');
    } finally {
        btn.classList.remove('loading');
        btn.innerHTML = '🌐 EN';
    }
}

function showStatus(msg, type) {
    const el = document.getElementById('translateStatus');
    el.textContent = msg;
    el.className = 'translate-status ' + type;
    if (type === 'success') {
        setTimeout(() => el.className = 'translate-status', 4000);
    }
}

function updateSelectStyle(selectEl) {
    selectEl.classList.toggle('no-selection', selectEl.value === '');
}

function updateCounter() {
    const selects = ['gameStyle', 'surfaceType', 'condition', 'colorPalette'];
    const count = selects.filter(id => document.getElementById(id).value !== '').length;
    document.getElementById('activeCount').textContent = count;
}

function generatePrompt() {
    const name = document.getElementById('textureName').value.trim();
    if (!name) { alert('Введи название текстуры!'); return; }

    if (hasCyrillic(name)) {
        showToast('⚠️ Название на русском — нажми 🌐 EN для перевода!');
        document.getElementById('textureName').style.borderColor = '#f59e0b';
        setTimeout(() => document.getElementById('textureName').style.borderColor = '', 3000);
        return;
    }

    const styleVal = document.getElementById('gameStyle').value;
    const surfaceVal = document.getElementById('surfaceType').value;
    const conditionVal = document.getElementById('condition').value;
    const paletteVal = document.getElementById('colorPalette').value;

    const view = viewMap[selectedView];
    let parts = [];

    // Базовая структура
    parts.push(`seamless tileable ${name} texture`);

    // Ракурс — ПРИНУДИТЕЛЬНО первым после названия
    parts.push(view.positive);

    // Стиль
    if (styleVal && styleMap[styleVal]) {
        const s = styleMap[styleVal];
        parts.push(s.keywords_en, s.quality_add);
        document.getElementById('disp-steps').textContent = s.steps;
        document.getElementById('disp-cfg').textContent = s.cfg.toFixed(1);
        document.getElementById('disp-sampler').textContent = s.sampler;
    } else {
        document.getElementById('disp-steps').textContent = '4';
        document.getElementById('disp-cfg').textContent = '1.0';
        document.getElementById('disp-sampler').textContent = 'euler';
    }

    if (surfaceVal && surfaceMap[surfaceVal]) parts.push(surfaceMap[surfaceVal]);
    if (conditionVal && conditionMap[conditionVal]) parts.push(conditionMap[conditionVal]);
    if (paletteVal && paletteMap[paletteVal]) parts.push(paletteMap[paletteVal]);

    // Технические требования
    parts.push('PBR material diffuse albedo map, flat uniform studio lighting, no shadows, no baked lighting, neutral grey illumination, game ready asset, Unity HDRP compatible, high surface detail, perfectly tiling, no seams');

    document.getElementById('positive-area').value = parts.join(', ');

    // Негатив — включает антиракурс
    const baseNeg = 'shadows, baked lighting, directional highlights, specular glare, gradient, vignette, blurry, watermark, text, logo, border, visible seam, non-tileable, asymmetric, chromatic aberration, low quality';
    document.getElementById('negative-area').value = baseNeg + ', ' + view.negative;

    showToast('✅ Промпт сгенерирован!');
}

function copyText(id) {
    const text = document.getElementById(id).value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => showToast('📋 Скопировано!'));
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

window.onload = () => {
    document.querySelectorAll('select').forEach(s => updateSelectStyle(s));
    updateCounter();
};
</script>
</body>
</html>
