<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Texture Gen v3 - Wide UI</title>
<style>
    :root {
        --bg-body: #0f1219; 
        --bg-card: #1a1d26; 
        --bg-input: #232732; 
        --accent-main: #5e6aff; 
        --accent-hover: #4b55ff;
        --text-primary: #ffffff;
        --text-secondary: #9ca3af;
        --pos-bg: rgba(16, 185, 129, 0.15);
        --pos-border: rgba(16, 185, 129, 0.4);
        --neg-bg: rgba(239, 68, 68, 0.15);
        --neg-border: rgba(239, 68, 68, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    
    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background-color: var(--bg-body); 
        color: var(--text-primary); 
        display: flex; 
        justify-content: center; 
        min-height: 100vh; 
        padding: 40px 20px;
    }

    .main-wrapper {
        width: 100%;
        max-width: 1200px; 
        display: grid;
        grid-template-columns: 350px 1fr; 
        gap: 24px;
    }

    .settings-card {
        background-color: var(--bg-card);
        padding: 30px;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }

    .header-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #333; padding-bottom: 10px;}
    .header-title span { color: var(--accent-main); }

    .input-wrapper { display: flex; flex-direction: column; gap: 8px; position: relative; }
    label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
    
    input, select { 
        width: 100%; 
        height: 48px; 
        padding: 0 14px;
        background-color: var(--bg-input); 
        border: 2px solid transparent; 
        border-radius: 10px; 
        color: white; 
        font-size: 15px;
        transition: all 0.2s ease;
    }

    input:focus, select:focus { 
        border-color: var(--accent-main); 
        background-color: #2a3040;
        box-shadow: 0 0 0 4px rgba(94, 106, 255, 0.15);
    }

    /* Стиль для опции "без выбора" */
    select option[value=""] {
        color: #6b7280;
        font-style: italic;
    }

    /* Когда выбрано "без выбора" — подсвечиваем select серым */
    select.no-selection {
        color: #6b7280;
        border-color: rgba(107, 114, 128, 0.3);
    }

    .btn-generate {
        width: 100%;
        height: 56px;
        background: linear-gradient(90deg, var(--accent-main), #7b8aff);
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        margin-top: auto; 
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(94, 106, 255, 0.3); }

    /* Счётчик активных параметров */
    .params-counter {
        font-size: 11px;
        color: var(--text-secondary);
        text-align: center;
        padding: 6px;
        background: rgba(94, 106, 255, 0.08);
        border-radius: 6px;
        border: 1px solid rgba(94, 106, 255, 0.15);
    }
    .params-counter span { color: var(--accent-main); font-weight: 700; }

    .result-card { display: flex; flex-direction: column; gap: 20px; }

    .prompt-block { 
        background: var(--bg-card); 
        border-radius: 16px; 
        padding: 24px;
        position: relative;
        display: flex;
        flex-direction: column;
        height: 380px; 
    }

    .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;}
    
    .label-row { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; text-transform: uppercase;}
    .badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; width: max-content;}
    .badge-pos { background: var(--pos-bg); border: 1px solid var(--pos-border); color: #a7f3d0; }
    .badge-neg { background: var(--neg-bg); border: 1px solid var(--neg-border); color: #fecaca; }

    textarea { 
        width: 100%; 
        height: 100%; 
        background: transparent; 
        border: none; 
        resize: none; 
        color: #d1d5db; 
        font-family: 'Consolas', 'Monaco', monospace; 
        font-size: 14px; 
        line-height: 1.6;
        overflow-y: auto; 
    }
    
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

    .btn-copy-small { 
        background: rgba(255,255,255,0.05); 
        border: none; 
        color: var(--text-secondary); 
        padding: 8px 12px; 
        border-radius: 6px; 
        cursor: pointer; 
        font-size: 13px;
    }
    .btn-copy-small:hover { background: rgba(255,255,255,0.1); color: white; }

    .settings-grid { 
        display: grid; 
        grid-template-columns: 1fr 1fr 1fr; 
        gap: 12px; 
        padding: 16px 24px;
        border-radius: 12px;
        background: rgba(0,0,0,0.2);
        margin-top: auto; 
    }
    .setting-item { display: flex; flex-direction: column; align-items: center; gap: 4px;}
    .s-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .s-value { font-family: 'Consolas', monospace; font-weight: 700; color: var(--text-primary); font-size: 14px; }

    .toast { 
        position: fixed; 
        bottom: 30px; 
        right: 30px; 
        background: #1e293b; 
        border-left: 5px solid var(--accent-main); 
        color: white; 
        padding: 16px 24px; 
        border-radius: 8px; 
        box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
        transform: translateY(120%); 
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex; align-items: center; gap: 10px;
        z-index: 100;
    }
    .toast.show { transform: translateY(0); }

    @media (max-width: 768px) {
        body { padding: 20px 15px; }
        .main-wrapper { grid-template-columns: 1fr; gap: 30px; }
        .settings-card { padding: 20px; }
        .header-title { font-size: 16px; }
        input, select { height: 44px; font-size: 14px; }
        .btn-generate { height: 50px; font-size: 14px; }
        .prompt-block { padding: 20px; height: auto; min-height: 300px; }
        textarea { font-size: 13px; line-height: 1.5; }
        .settings-grid { grid-template-columns: 1fr; gap: 8px; margin-top: 20px;}
    }
</style>
</head>
<body>

<div class="main-wrapper">
    <div class="settings-card">
        <div class="header-title">
            Параметры <span>Текстуры</span>
        </div>

        <div class="input-wrapper">
            <label>Название текстуры (Required)</label>
            <input type="text" id="textureName" placeholder="Введите название..." autocomplete="off">
        </div>

        <div class="input-wrapper">
            <label>Стиль игры / АРТА (Optional)</label>
            <select id="gameStyle" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="realistic">Фотореализм (Photorealistic)</option>
                <option value="stylized">Стилизованный (Artistic)</option>
                <option value="lowpoly">Low Poly / Indie</option>
                <option value="scifi">Sci-Fi / Cyberpunk</option>
                <option value="fantasy">High Fantasy</option>
                <option value="horror">Horror / Dark</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Поверхность (Surface) (Optional)</label>
            <select id="surfaceType" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="floor">Пол / Земля</option>
                <option value="wall">Стена</option>
                <option value="ceiling">Потолок</option>
                <option value="organic">Органика / Природа</option>
                <option value="metal">Металл</option>
                <option value="wood">Дерево</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Состояние (Condition) (Optional)</label>
            <select id="condition" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="new">Новое / Идеальное</option>
                <option value="used">Потёртое (Used)</option>
                <option value="old">Старое (Ancient)</option>
                <option value="ruined">Разрушенное</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Тип укладки (Pattern) (Optional)</label>
            <select id="tilingPattern" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="straight">Прямая укладка (Straight)</option>
                <option value="brick">Кирпичная укладка (Brick pattern)</option>
                <option value="grid">Сетка / Рамки (Grid)</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label>Цветовая гамма (Optional)</label>
            <select id="colorPalette" onchange="updateSelectStyle(this); updateCounter()">
                <option value="">— Без выбора —</option>
                <option value="neutral">Нейтральная (Neutral Grey)</option>
                <option value="warm">Теплая (Warm Earth)</option>
                <option value="cool">Холодная (Cool Blue)</option>
            </select>
        </div>

        <!-- Счётчик активных параметров -->
        <div class="params-counter" id="paramsCounter">
            Активных параметров: <span id="activeCount">0</span> из 5
        </div>

        <button class="btn-generate" onclick="generatePrompt()">
            ⚡ <span id="btnText">Сгенерировать промпт</span>
        </button>
    </div>

    <div class="result-card">
        
        <div class="prompt-block" style="border-top: 4px solid var(--pos-border); border-bottom: none; background: rgba(16, 185, 129, 0.03);">
            <div class="block-header">
                <div class="label-row"><span class="badge badge-pos">Positive Prompt</span></div>
                <button class="btn-copy-small" onclick="copyText('positive-area')">📋 Копировать</button>
            </div>
            <textarea id="positive-area" readonly></textarea>
            
            <div class="settings-grid">
                <div class="setting-item"><span class="s-label">Steps</span><span class="s-value" id="disp-steps" style="color:#fff;">4</span></div>
                <div class="setting-item"><span class="s-label">CFG Scale</span><span class="s-value" id="disp-cfg" style="color:#fbbf24;">1.0</span></div>
                <div class="setting-item"><span class="s-label">Sampler</span><span class="s-value" id="disp-sampler" style="color:#3b82f6;">euler</span></div>
            </div>
        </div>

        <div class="prompt-block" style="border-top: 4px solid var(--neg-border); border-bottom: none; background: rgba(0,0,0,0.2);">
            <div class="block-header">
                <div class="label-row"><span class="badge badge-neg">Negative Prompt</span></div>
                <button class="btn-copy-small" onclick="copyText('negative-area')">📋 Копировать</button>
            </div>
            <textarea id="negative-area" readonly style="color: #7f1d1d;"></textarea>
        </div>

    </div>
</div>

<div class="toast" id="toast">
    <span style="font-size: 20px;">✅</span> <span id="toast-msg">Скопировано!</span>
</div>

<script>
const styleMap = {
    realistic: { 
        keywords_en: 'photorealistic, ultra-detailed, physically accurate, raytracing, cinematic lighting', 
        quality_add: 'hyperrealistic texture, 8K detail, noise film grain', 
        steps: 20, cfg: 7.5, sampler: 'dpmpp_2m' 
    },
    stylized: { 
        keywords_en: 'stylized, hand-painted, artistic, vibrant colors, expressive brushwork, clean edges', 
        quality_add: 'game art style, cartoon texture, cel shading, vivid saturation', 
        steps: 25, cfg: 7.0, sampler: 'euler_a' 
    },
    lowpoly: { 
        keywords_en: 'low poly, geometric shapes, simplified vertices, flat shading, minimal detail', 
        quality_add: 'indie game style, vector look, clean topology, bright colors', 
        steps: 4, cfg: 1.0, sampler: 'euler' 
    },
    scifi: { 
        keywords_en: 'sci-fi, futuristic, high-tech, industrial, mechanical parts, metallic surfaces', 
        quality_add: 'cyberpunk aesthetic, polished metal, neon highlights, dark tones', 
        steps: 25, cfg: 7.0, sampler: 'dpmpp_2m' 
    },
    fantasy: { 
        keywords_en: 'fantasy, magical, mystical, ornate details, enchanted atmosphere', 
        quality_add: 'epic fantasy art, rich texture detail, glowing runes, intricate design', 
        steps: 30, cfg: 7.5, sampler: 'dpmpp_2m' 
    },
    horror: { 
        keywords_en: 'horror, dark, disturbing, decayed, ominous atmosphere, sinister details', 
        quality_add: 'dark texture, unsettling, gritty detail, low light, shadows', 
        steps: 30, cfg: 7.5, sampler: 'dpmpp_2m' 
    }
};

const surfaceMap = {
    floor: 'floor perspective, ground plane view',
    wall: 'vertical surface, straight-on wall texture',
    ceiling: 'overhead surface, top-down ceiling view',
    organic: 'irregular shape texture, natural close-up view',
    metal: 'straight-on industrial view, metallic material finish',
    wood: 'straight-on timber view, visible wood grain'
};

const conditionMap = {
    new: 'pristine condition, perfectly clean, sharp edges, undamaged, factory fresh',
    used: 'worn but functional, slightly weathered, minor scratches, soft patina',
    old: 'heavily aged, weathered by time, deep cracks, eroded texture, antique look',
    ruined: 'severely damaged, crumbling structure, broken pieces, destruction'
};

const patternMap = {
    straight: 'straight tiling pattern',
    brick: 'brick bond tiling pattern',
    grid: 'grid tiling pattern'
};

const paletteMap = {
    neutral: 'grey palette, monochromatic lighting, no strong color saturation',
    warm: 'brown and orange hues, warm ambient light, dusty colors',
    cool: 'blue and teal hues, cold ambient light, ice tones'
};

// Обновляет визуальный стиль селекта (серый если "без выбора")
function updateSelectStyle(selectEl) {
    if (selectEl.value === '') {
        selectEl.classList.add('no-selection');
    } else {
        selectEl.classList.remove('no-selection');
    }
}

// Обновляет счётчик активных параметров
function updateCounter() {
    const selects = ['gameStyle', 'surfaceType', 'condition', 'tilingPattern', 'colorPalette'];
    const activeCount = selects.filter(id => document.getElementById(id).value !== '').length;
    document.getElementById('activeCount').textContent = activeCount;
}

// Инициализация при загрузке
window.onload = function() {
    const selects = document.querySelectorAll('select');
    selects.forEach(s => updateSelectStyle(s));
    updateCounter();
};

function generatePrompt() {
    const name = document.getElementById('textureName').value.trim();
    
    if (!name) { 
        alert('Пожалуйста, введите название текстуры!'); 
        return; 
    }

    const styleVal   = document.getElementById('gameStyle').value;
    const surfaceVal = document.getElementById('surfaceType').value;
    const conditionVal = document.getElementById('condition').value;
    const patternVal = document.getElementById('tilingPattern').value;
    const paletteVal = document.getElementById('colorPalette').value;

    let parts = [];

    // 1. Базовая структура — паттерн добавляем только если выбран
    if (patternVal && patternMap[patternVal]) {
        parts.push(`seamless tileable ${name} texture, ${patternMap[patternVal]}`);
    } else {
        parts.push(`seamless tileable ${name} texture`);
    }

    // 2. Стиль — только если выбран
    if (styleVal && styleMap[styleVal]) {
        const s = styleMap[styleVal];
        parts.push(s.keywords_en);
        parts.push(s.quality_add);
        document.getElementById('disp-steps').textContent = s.steps;
        document.getElementById('disp-cfg').textContent = s.cfg.toFixed(1);
        document.getElementById('disp-sampler').textContent = s.sampler;
    } else {
        // Дефолтные настройки если стиль не выбран
        document.getElementById('disp-steps').textContent = '4';
        document.getElementById('disp-cfg').textContent = '1.0';
        document.getElementById('disp-sampler').textContent = 'euler';
    }

    // 3. Поверхность — только если выбрана
    if (surfaceVal && surfaceMap[surfaceVal]) {
        parts.push(surfaceMap[surfaceVal]);
    }

    // 4. Состояние — только если выбрано
    if (conditionVal && conditionMap[conditionVal]) {
        parts.push(conditionMap[conditionVal]);
    }

    // 5. Палитра — только если выбрана
    if (paletteVal && paletteMap[paletteVal]) {
        parts.push(paletteMap[paletteVal]);
    }

    // 6. Технические требования — всегда
    parts.push('PBR material diffuse map, albedo map, flat uniform studio lighting, neutral grey illumination, no shadows, no baked lighting, game ready asset, Unity HDRP compatible, high surface detail, perfectly tiling, no seams');

    document.getElementById('positive-area').value = parts.join(', ');

    document.getElementById('negative-area').value = 'shadows, baked lighting, directional highlights, specular glare, gradient background, vignette, blurry, out of focus, jpeg artifacts, watermark, signature, text, logo, border, visible seam, non-tileable edge, asymmetric, perspective distortion, fisheye lens, chromatic aberration, deformed eyes';

    showToast("Промпт сгенерирован!");
}

function copyText(elementId) {
    const text = document.getElementById(elementId).value;
    if(!text) return;
    navigator.clipboard.writeText(text).then(() => {
        showToast('Скопировано в буфер!');
    });
}

function showToast(message) {
    const toast = document.getElementById('toast');
    const msg = document.getElementById('toast-msg');
    msg.innerHTML = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
